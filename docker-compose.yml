version: '3.8'

services:
  quranapi:
    container_name: quranapi
    image: quranapi:latest
    build:
      context: ./quran-api-nest
      dockerfile: Dockerfile
    env_file:
      - ./quran-api-nest/.env
    ports:
      - "5201:3000"
    environment:
      - NODE_ENV=production
    networks:
      - quranapi-net

networks:
  quranapi-net:
    driver: bridge
